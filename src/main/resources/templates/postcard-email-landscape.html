<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postcard Email</title>
    <style>
        @media screen and (max-width: 620px) {
            .responsive-card {
                height: 60vw !important;
                aspect-ratio: 1.5;
            }
        }
    </style>
</head>

<body
    style="margin:0; padding:0; width:100% !important; background-color:#f8f9fa; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;">
    <div style="background-color:#f8f9fa; width:100%;">
        <table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#f8f9fa"
            style="width:100%; max-width:100%; background-color:#f8f9fa; margin: 0 auto;">
            <tr>
                <td align="center" valign="top" style="padding: 40px 10px; text-align: center;">
                    <center>
                        <!-- Header -->
                        <table width="600" cellpadding="0" cellspacing="0" border="0"
                            style="margin: 0 auto 20px auto; width: 100%; max-width: 600px;">
                            <tr>
                                <td align="center" style="font-size: 14px; font-weight: 500; color: #111827;">
                                    <span
                                        style="color: #16a34a; font-size: 18px; margin-right: 12px; vertical-align: middle;">&#x2709;</span>&nbsp;{{headerText}}
                                </td>
                            </tr>
                        </table>

                        <!-- White Card (Back) -->
                        <table class="responsive-card" width="600" height="400" cellpadding="0" cellspacing="0"
                            border="0" bgcolor="#ffffff"
                            style="margin: 0 auto 30px auto; width: 100%; max-width: 600px; height: 400px; aspect-ratio: 1.5; border:1px solid #e5e7eb; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); text-align: left;">
                            <!-- Card Header (Logo & Stamp) -->
                            <tr>
                                <td style="padding: 30px 30px 10px 30px;" valign="top" height="60">
                                    <table width="100%" cellpadding="0" cellspacing="0" border="0">
                                        <tr>
                                            <td align="left" valign="top">
                                                <div
                                                    style="font-size: 16px; font-weight: bold; letter-spacing: 2px; color: #111827;">
                                                    &#x2736; MAYLEO</div>
                                            </td>
                                            <td align="right" valign="top">
                                                <div
                                                    style="border: 1px solid #d1d5db; width: 40px; height: 50px; text-align: center; line-height: 50px; color: #9ca3af; font-size: 10px;" />
                                            </td>
                                        </tr>
                                    </table>
                                </td>
                            </tr>
                            <!-- Card Content -->
                            <tr height="100%">
                                <td style="padding: 0 30px 40px 30px; height: 100%;" valign="top" height="100%">
                                    <table width="100%" height="100%" cellpadding="0" cellspacing="0" border="0"
                                        style="height: 100%;">
                                        <tr>
                                            <td width="65%" valign="top" height="100%"
                                                style="font-size:15px; line-height:1.6; color:#374151; padding-right: 20px; border-right: 1px solid #f3f4f6; height: 100%;">
                                                {{mainText}}
                                            </td>
                                            <td width="35%" valign="bottom" height="100%"
                                                style="font-size:13px; color:#6b7280; text-align:right; padding-left: 20px; height: 100%;">
                                                {{smallNote}}
                                            </td>
                                        </tr>
                                    </table>
                                </td>
                            </tr>
                        </table>

                        <!-- Postcard Image (Front) -->
                        <table width="600" cellpadding="0" cellspacing="0" border="0"
                            style="margin: 0 auto 40px auto; width: 100%; max-width: 600px;">
                            <tr>
                                <td align="center">
                                    <img src="cid:postcardImage" alt="Postcard" width="600"
                                        style="display:block; border:0; width: 100%; max-width:600px; height:auto; border-radius: 8px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);">
                                </td>
                            </tr>
                        </table>

                        <!-- Footer -->
                        <table width="600" cellpadding="0" cellspacing="0" border="0"
                            style="margin: 0 auto; width: 100%; max-width: 600px;">
                            <tr>
                                <td align="center"
                                    style="font-size: 12px; color: #111827; margin-bottom: 10px; font-weight: bold; line-height: 1.5;">
                                    {{madeByText}}
                                </td>
                            </tr>
                            <tr>
                                <td align="center"
                                    style="font-size: 10px; color: #9ca3af; line-height: 1.4; padding-top: 15px;">
                                    {{footerText}}
                                </td>
                            </tr>
                        </table>
                    </center>
                </td>
            </tr>
        </table>
    </div>
</body>

</html>
